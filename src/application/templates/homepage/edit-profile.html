{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="shortcut icon" type="image/png" href="{% static 'favicon.ico' %}">
  <link rel="stylesheet" href="{% static 'homepage/edit-profile.css' %}?{% now 'U' %}">

  <title>Edit Profile / Swingrs</title>
</head>
<body>
  <main class="edit-profile-page">
    <div class="edit-profile-container">

      <div class="edit-profile-header">
        <a href="/user" class="back-link">← Back</a>
        <h1>Edit Profile</h1>
        <p>Update your profile details and photos.</p>
      </div>

      <section class="profile-preview-card">
        <div class="main-photo-slot">
          <ion-icon name="person-outline"></ion-icon>
          <span>Main Profile Photo</span>
        </div>

        <div class="profile-info">
          <h2>Your Name</h2>
          <p>Age • Location</p>
        </div>
      </section>

      <section class="photo-section">
        <h2>Profile Pictures</h2>

        <div class="photo-grid">
          <div class="photo-slot"><ion-icon name="add-outline"></ion-icon></div>
          <div class="photo-slot"><ion-icon name="add-outline"></ion-icon></div>
          <div class="photo-slot"><ion-icon name="add-outline"></ion-icon></div>
          <div class="photo-slot"><ion-icon name="add-outline"></ion-icon></div>
          <div class="photo-slot"><ion-icon name="add-outline"></ion-icon></div>
          <div class="photo-slot"><ion-icon name="add-outline"></ion-icon></div>
        </div>
      </section>

      <section class="edit-fields-card">
        <label>Name</label>
        <input type="text" placeholder="Enter your name">

        <label>Bio</label>
        <textarea placeholder="Write something about yourself"></textarea>

        <button class="save-btn">Save Profile</button>
        <a href="/logout" class="logout-btn">Logout</a>
      </section>

    </div>
  </main>

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
