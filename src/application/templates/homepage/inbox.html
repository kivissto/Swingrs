{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="shortcut icon" type="image/png" href="{% static 'favicon.ico' %}">
  <link rel="stylesheet" href="{% static 'homepage/inbox.css' %}?{% now 'U' %}">

  <title>Inbox / Swingrs</title>
</head>

<body>
  {% csrf_token %}

  <main class="inbox-page">
    <div class="inbox-container">
      <div class="inbox-header">
        <h1>Messages</h1>
        <p>Your current matches</p>
      </div>

      <div class="message-list">
        {% for user in users %}
          <a href="{% url 'message_detail' user.id %}" class="message-user">
            <img class="message-avatar" src="{{ user.photoUrl }}" alt="{{ user.name }}">

            <div class="message-info">
              <h3>{{ user.name }}</h3>
              <p>{{ user.bio }}</p>
            </div>

            <span class="message-time">Now</span>
          </a>
        {% empty %}
          <div class="empty-inbox">
            No messages yet.
          </div>
        {% endfor %}
      </div>
    </div>
  </main>

  <div class="navigation">
    <nav>
      <ul>
        <li class="list">
          <a href="/home">
            <span class="icon"><ion-icon name="home-outline"></ion-icon></span>
            <span class="text">Home</span>
          </a>
        </li>

        <li class="list active">
          <a href="/inbox">
            <span class="icon"><ion-icon name="chatbubbles-outline"></ion-icon></span>
            <span class="text">Inbox</span>
          </a>
        </li>

        <li class="list">
          <a href="/likes">
            <span class="icon"><ion-icon name="heart-outline"></ion-icon></span>
            <span class="text">Likes</span>
          </a>
        </li>

        <li class="list">
          <a href="/venues">
            <span class="icon"><ion-icon name="golf-outline"></ion-icon></span>
            <span class="text">Venues</span>
          </a>
        </li>

        <li class="list">
          <a href="/user">
            <span class="icon"><ion-icon name="person-outline"></ion-icon></span>
            <span class="text">User</span>
          </a>
        </li>
      </ul>
    </nav>
  </div>

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
