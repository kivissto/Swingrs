{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="shortcut icon" type="image/png" href="{% static 'favicon.ico' %}">
  <link rel="stylesheet" href="{% static 'homepage/venues.css' %}?{% now 'U' %}">
  <title>Venues / Swingrs</title>
</head>
<body>
  <main class="page">
    <div class="page-card">
      <div class="page-icon">
        <ion-icon name="golf-outline"></ion-icon>
      </div>
      <h1>Venues</h1>
      <p>Golf courses and nearby places to play will appear here.</p>
    </div>
  </main>

  <div class="navigation">
    <nav>
      <ul>
        <li>
          <a href="/home">
            <span class="icon"><ion-icon name="home-outline"></ion-icon></span>
            <span class="text">Home</span>
          </a>
        </li>
        <li>
          <a href="/inbox">
            <span class="icon"><ion-icon name="chatbubbles-outline"></ion-icon></span>
            <span class="text">Inbox</span>
          </a>
        </li>
        <li>
          <a href="/likes">
            <span class="icon"><ion-icon name="heart-outline"></ion-icon></span>
            <span class="text">Likes</span>
          </a>
        </li>
        <li class="active">
          <a href="/venues">
            <span class="icon"><ion-icon name="golf-outline"></ion-icon></span>
            <span class="text">Venues</span>
          </a>
        </li>
        <li>
          <a href="/user">
            <span class="icon"><ion-icon name="person-outline"></ion-icon></span>
            <span class="text">User</span>
          </a>
        </li>
      </ul>
    </nav>
  </div>

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
