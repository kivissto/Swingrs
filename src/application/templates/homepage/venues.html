{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="shortcut icon" type="image/png" href="{% static 'favicon.ico' %}"/>
  <link rel="stylesheet" type='text/css' href='{% static "homepage\venues.css" %}?{% now "U" %}'>
  <title>{% block title %}Venues / Swingrs{% endblock %}</title>
</head>
<body>
  <section>
    <h2>Venues</h2>
  </section>
  {% csrf_token %}
  <div class='navigation'>
    <nav>
      <ul>
        <li class='list'>
          <a href='/home' id='home'>
            <span class='icon'>
              <ion-icon name="home-outline"></ion-icon>
            </span>
            <span class='text'>Home</span>
          </a>
        </li>
        <li class='list'>
          <a href='/inbox' id='inbox'>
            <span class='icon'>
              <ion-icon name="chatbubbles-outline"></ion-icon>
            </span>
            <span class='text'>Inbox</span>
          </a>
        </li>
        <li class='list'>
          <a href='/likes' id='likes'>
            <span class='icon'>
              <ion-icon name="heart-outline"></ion-icon>
            </span>
            <span class='text'>Likes</span>
          </a>
        </li>
        <li class='list active'>
          <a href='/venues' id='venues'>
            <span class='icon'>
              <ion-icon name="golf-outline"></ion-icon>
            </span>
            <span class='text'>Venues</span>
          </a>
        </li>
        <li class='list'>
          <a href='/user' id='user'>
            <span class='icon'>
              <ion-icon name="person-outline"></ion-icon>
            </span>
            <span class='text'>User</span>
          </a>
        </li>
        <div class='indicator'></div>
      </ul>
    </nav>
  </div>
  <script>
    const navLinks = document.querySelectorAll('.navigation .list a');
    const navItems = document.querySelectorAll('.navigation .list');
    navLinks.forEach((link) => {
        link.addEventListener('click', function () {
            navItems.forEach((item) => {
                item.classList.remove('active');
            });
            this.closest('.list').classList.add('active');
        });
    });
  </script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
