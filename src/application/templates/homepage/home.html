{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="shortcut icon" type="image/png" href="{% static 'favicon.ico' %}">
  <link rel="stylesheet" href="{% static 'homepage/home.css' %}?{% now 'U' %}">

  <title>Home / Swingrs</title>
</head>

<body>
  {% csrf_token %}

  <main class="home-page">
    <div class="card-container">
      {% for user in users %}
        <div class="card" style="background-image: url('{{ user.photoUrl }}');">
          <div class="card-gradient"></div>

          <div class="card-content">
            <h3>{{ user.name }}, {{ user.age }}</h3>
            <p>{{ user.bio }}</p>
          </div>
        </div>
      {% empty %}
        <div class="no-cards-message">
          No more users in your area.<br>
          Please expand your search preferences.
        </div>
      {% endfor %}
    </div>
  </main>

  <div class="navigation">
    <nav>
      <ul>
        <li class="list active">
          <a href="/home">
            <span class="icon"><ion-icon name="home-outline"></ion-icon></span>
            <span class="text">Home</span>
          </a>
        </li>

        <li class="list">
          <a href="/inbox">
            <span class="icon"><ion-icon name="chatbubbles-outline"></ion-icon></span>
            <span class="text">Inbox</span>
          </a>
        </li>

        <li class="list">
          <a href="/likes">
            <span class="icon"><ion-icon name="heart-outline"></ion-icon></span>
            <span class="text">Likes</span>
          </a>
        </li>

        <li class="list">
          <a href="/venues">
            <span class="icon"><ion-icon name="golf-outline"></ion-icon></span>
            <span class="text">Venues</span>
          </a>
        </li>

        <li class="list">
          <a href="/user">
            <span class="icon"><ion-icon name="person-outline"></ion-icon></span>
            <span class="text">User</span>
          </a>
        </li>
      </ul>
    </nav>
  </div>

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>

  <script>
    function initializeCards() {
      const cards = document.querySelectorAll('.card');

      cards.forEach(card => {
        if (card.dataset.hammerInitialized) return;
        card.dataset.hammerInitialized = true;

        const hammer = new Hammer(card);

        hammer.on('pan', function(ev) {
          card.style.transform = `translate(${ev.deltaX}px, ${ev.deltaY}px) rotate(${ev.deltaX / 10}deg)`;
        });

        hammer.on('panend', function(ev) {
          const threshold = 100;

          if (Math.abs(ev.deltaX) > threshold || ev.deltaY < -threshold) {
            if (ev.deltaX > threshold) {
              card.classList.add('swipe-right');
            } else if (ev.deltaX < -threshold) {
              card.classList.add('swipe-left');
            } else if (ev.deltaY < -threshold) {
              card.classList.add('swipe-up');
            }

            card.style.transform = '';

            card.addEventListener('transitionend', () => {
              card.remove();

              if (document.querySelectorAll('.card').length === 0) {
                const container = document.querySelector('.card-container');
                const message = document.createElement('div');
                message.classList.add('no-cards-message');
                message.innerHTML = 'No more users in your area.<br>Please expand your search preferences.';
                container.appendChild(message);
              }
            }, { once: true });
          } else {
            card.style.transform = '';
          }
        });
      });
    }

    initializeCards();
  </script>
</body>
</html>
