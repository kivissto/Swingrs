{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="shortcut icon" type="image/png" href="{% static 'favicon.ico' %}"/>
  <link rel="stylesheet" type='text/css' href='{% static "docking\forgot-password.css" %}?{% now "U" %}'>
  <title>{% block title %}Forgot Password / Swingrs{% endblock %}</title>
</head>
<body>
  <div class="landing-container">
    <div class="docking">
      <img src="{% static 'logo-swingrs.png' %}" class="logo" alt="Swingrs Logo">
      <h1>Forgot Password</h1>
      <a href="{% url 'landing' %}" class="back-button">
        ← Back to Login
      </a>
      <form action="/forgot-password" method="post">
        {% csrf_token %}
        <div class="form">
          <div class="email">
            <input type="text" name="email" autocomplete="off" required />
            <label for="email" class="labels">
              <span class="content-email">Email</span>
            </label>
          </div>

          <button id="button">Recover Password</button>
        </div>
      </form>
    </div>
  </div>

  <div class="container">{% block content %}{% endblock %}</div>
</body>
</html>
